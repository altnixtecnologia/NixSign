<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NixSign - Entrada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #f5f7fb;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-strong: #ffffff;
            --text: #0f172a;
            --text-soft: #5b6576;
            --border: rgba(15, 23, 42, 0.14);
            --brand: #2563eb;
            --brand-soft: rgba(37, 99, 235, 0.12);
            --radius: 16px;
            --shadow: 0 20px 50px rgba(16, 24, 40, 0.08);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0b1220;
                --surface: rgba(19, 28, 45, 0.86);
                --surface-strong: #1b273b;
                --text: #e8edf7;
                --text-soft: #a9b5c9;
                --border: rgba(206, 221, 243, 0.17);
                --brand: #60a5fa;
                --brand-soft: rgba(96, 165, 250, 0.18);
            }
        }
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 92% 2%, rgba(37, 99, 235, 0.14), transparent 34%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.34), transparent 38%),
                var(--bg);
            min-height: 100vh;
        }
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid color-mix(in srgb, var(--brand) 55%, var(--border));
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(8px);
        }
        .entry-btn {
            border-radius: 10px;
            border: 1px solid color-mix(in srgb, var(--brand) 34%, var(--border));
            background: color-mix(in srgb, var(--brand-soft) 26%, var(--surface-strong));
            color: color-mix(in srgb, var(--text) 90%, #102032);
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .entry-btn:hover {
            border-color: color-mix(in srgb, var(--brand) 55%, var(--border));
            background: color-mix(in srgb, var(--brand-soft) 46%, var(--surface-strong));
            transform: translateY(-1px);
        }
        .entry-btn-ghost {
            border-radius: 10px;
            border: 1px solid var(--border);
            background: color-mix(in srgb, var(--surface-strong) 88%, transparent);
            color: var(--text-soft);
        }
    </style>
</head>
<body>
    <main class="min-h-screen flex items-center justify-center p-4 sm:p-8">
        <section class="glass-card w-full max-w-xl rounded-3xl overflow-hidden bg-white p-8 sm:p-10">
            <p class="text-xs uppercase tracking-wide" style="color: var(--text-soft);">NixSign</p>
            <h1 class="mt-2 text-3xl font-bold" style="color: var(--text);">Entrar no sistema</h1>
            <p class="mt-2 text-sm" style="color: var(--text-soft);">
                Acesse o painel administrativo para gerar links e acompanhar assinaturas.
            </p>

            <div class="mt-8 space-y-3">
                <a href="painel.html" id="access-panel-btn" class="entry-btn w-full inline-flex justify-center items-center px-5 py-3 text-sm">
                    Acessar Painel
                </a>
                <button id="google-login-btn" type="button" class="entry-btn-ghost w-full inline-flex justify-center items-center px-5 py-3 text-sm cursor-not-allowed" disabled>
                    Login com Google (em breve)
                </button>
            </div>

            <div class="mt-8 rounded-xl border p-4" style="border-color: var(--border); background: color-mix(in srgb, var(--brand-soft) 32%, var(--surface-strong));">
                <p class="text-xs leading-relaxed" style="color: var(--text-soft);">
                    O login federado será ativado na próxima etapa de configuração.
                </p>
            </div>
        </section>
    </main>
</body>
</html>
